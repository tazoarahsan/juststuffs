<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>REsimpli — Billing & Cancellation Flow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ============================================================
   REsimpli — Billing page + Cancellation Save Flow (prototype)
   Brand: #008088 dark teal · display feel: Gilroy (Plus Jakarta Sans web stand-in)
   Flow logic mirrors the retention "Offer Matrix" exactly (see REASONS in JS).
   ============================================================ */

:root{
  --teal:#008088;
  --teal-dark:#006970;
  --teal-700:#0a6e74;
  --teal-tint:#e7f4f3;
  --teal-tint-2:#d6ecea;
  --teal-border:#a9d6d3;

  --navy:#1e2a37;
  --navy-2:#172230;

  --red:#dc2f3a;
  --red-soft:#fdeaea;
  --red-700:#b91c1c;

  --ink:#101828;
  --ink-2:#475467;
  --ink-3:#667085;
  --line:#e7eaee;
  --line-2:#eef1f4;
  --bg:#ffffff;
  --card:#ffffff;
  --amber:#b54708;
  --amber-soft:#fef6ee;

  --shadow-sm:0 1px 2px rgba(16,24,40,.06);
  --shadow-md:0 8px 24px rgba(16,24,40,.10);
  --shadow-lg:0 24px 60px rgba(16,24,40,.22);
  --radius:14px;
  --rail:72px;
  --topbar:64px;
  --font:'Plus Jakarta Sans','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
}

*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--font);
  color:var(--ink);
  background:var(--bg);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
button{font-family:inherit}
svg{width:1em;height:1em;display:block}

/* ---------------------------------- App shell ---------------------------------- */
.app{display:flex;min-height:100vh}

/* Rail (slim dark icon sidebar, matches live app) */
.rail{
  width:var(--rail);
  background:var(--navy);
  color:#9fb0c0;
  display:flex;flex-direction:column;align-items:center;
  padding:14px 0 12px;gap:6px;
  position:sticky;top:0;height:100vh;flex:0 0 var(--rail);
}
.rail__logo{
  width:42px;height:42px;border-radius:12px;
  background:linear-gradient(160deg,var(--teal),#03686f);
  display:grid;place-items:center;color:#fff;font-size:22px;margin-bottom:10px;
  box-shadow:0 6px 14px rgba(0,128,136,.4);
}
.rail__btn{
  width:42px;height:42px;border-radius:11px;border:0;background:transparent;color:#b6c2cf;
  display:grid;place-items:center;font-size:21px;cursor:pointer;transition:.15s;position:relative;
}
.rail__btn:hover{background:rgba(255,255,255,.08);color:#eef2f6}
.rail__btn--mail{color:#ea4335}
.rail__btn--teal{color:#23b3aa}
.rail__btn.is-active{background:rgba(0,128,136,.22);color:#5fd0c9}
.rail__btn.is-active::before{content:"";position:absolute;left:-14px;top:9px;bottom:9px;width:3px;border-radius:0 3px 3px 0;background:var(--teal)}
.rail__spacer{flex:1}
.rail__btn .dot{position:absolute;top:7px;right:7px;width:7px;height:7px;border-radius:50%;background:var(--red);border:1.5px solid var(--navy)}

/* Main column */
.main{flex:1;min-width:0;display:flex;flex-direction:column}

/* Topbar */
.topbar{
  height:var(--topbar);background:#fff;border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:18px;padding:0 20px;position:sticky;top:0;z-index:20;
}
.onb{display:flex;align-items:center;gap:9px;flex:0 0 auto;text-decoration:none}
.ring{width:34px;height:34px}
.onb__txt{color:var(--red);font-weight:700;font-size:13.5px;white-space:nowrap}
.search{
  flex:1 1 280px;max-width:420px;min-width:120px;display:flex;align-items:center;gap:9px;
  background:#f3f4f6;border:1px solid #eceef1;border-radius:10px;padding:8px 12px;color:var(--ink-3);
}
.search input{border:0;background:transparent;outline:none;font-size:14px;color:var(--ink);width:100%}
.search input::placeholder{color:#98a2b3}
.topbar__links{display:flex;align-items:center;gap:20px;flex:0 0 auto}
.tlink{color:var(--red);font-weight:700;font-size:13.5px;text-decoration:underline;white-space:nowrap;cursor:pointer}
.tlink--count{text-decoration:underline}
.topbar__right{margin-left:auto;display:flex;align-items:center;gap:12px;flex:0 0 auto}
.btn-add{display:flex;align-items:stretch;border-radius:9px;overflow:hidden;box-shadow:var(--shadow-sm)}
.btn-add__main{background:var(--teal);color:#fff;border:0;font-weight:700;font-size:14px;padding:9px 14px;display:flex;align-items:center;gap:7px;cursor:pointer}
.btn-add__main:hover{background:var(--teal-dark)}
.btn-add__caret{background:var(--teal-dark);color:#fff;border:0;width:30px;display:grid;place-items:center;cursor:pointer;font-size:12px}
.iconbtn{width:38px;height:38px;border-radius:9px;border:0;background:transparent;color:var(--ink-2);display:grid;place-items:center;font-size:19px;cursor:pointer;position:relative}
.iconbtn:hover{background:#f3f4f6}
.iconbtn--flame{color:#f0530c}
.iconbtn .dot{position:absolute;top:6px;right:7px;width:7px;height:7px;border-radius:50%;background:var(--red)}
.balance{display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:9px;padding:7px 12px;background:#fff;cursor:pointer;font-weight:700;font-size:13.5px;color:var(--ink)}
.balance .coin{width:20px;height:20px;border-radius:50%;background:#eef1f4;display:grid;place-items:center;font-size:11px;color:var(--ink-2)}
.avatar{display:flex;align-items:center;gap:6px;border:0;border-radius:30px;padding:2px;cursor:pointer;background:transparent}
.avatar .ph{width:34px;height:34px;border-radius:50%;background:#e6e9ee;color:#8a93a0;display:grid;place-items:center}
.avatar .ph svg{width:20px;height:20px}

/* Content — flat layout on white, exactly like the live page */
.content{padding:24px 34px 60px;width:100%}
.billing-head{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin:6px 0 14px}
.cards-title{font-size:24px;font-weight:800;letter-spacing:-.01em;margin:0;color:var(--ink)}
.cards-count{font-weight:800;color:var(--ink)}
.head-actions{display:flex;align-items:center;gap:14px;flex-wrap:wrap}

.btn-outline{border:1.4px solid;border-radius:9px;padding:10px 18px;font-weight:700;font-size:14.5px;background:#fff;cursor:pointer;display:inline-flex;align-items:center;gap:9px;transition:.15s;line-height:1.1}
.btn-outline--danger{color:#a82d2d;border-color:#e7c3c3}
.btn-outline--danger:hover{background:#fbf0f0}
.btn-outline--danger:disabled{opacity:.45;cursor:not-allowed}
.btn-addnew .plus-circle{display:grid;place-items:center;width:20px;height:20px;border-radius:50%;border:1.6px solid currentColor;font-size:14px;font-weight:700;line-height:1}

/* Cards table — flat, full width */
.cards-table{width:100%;border-collapse:collapse}
.cards-table th{text-align:left;font-size:15px;color:#2f3742;font-weight:700;padding:16px 10px;border-bottom:1px solid var(--line)}
.cards-table td{padding:22px 10px;border-bottom:1px solid var(--line);font-size:15px;color:var(--ink);vertical-align:middle}
.cards-table th:first-child,.cards-table td:first-child{width:48%}
.cards-table th:nth-child(2),.cards-table td:nth-child(2){width:18%}
.cardcell{display:flex;align-items:center;gap:14px;font-weight:500}
.brandmark{width:36px;height:24px;border-radius:5px;background:#1434cb;color:#fff;font-size:10.5px;font-weight:800;display:grid;place-items:center;letter-spacing:.5px;font-style:italic}
.act{display:flex;align-items:center;gap:22px;color:var(--ink-3)}
.act__icon{background:none;border:0;cursor:pointer;color:var(--ink-3);font-size:18px;display:grid;place-items:center}
.act__icon:hover{color:var(--ink)}
.radio-prim{display:flex;align-items:center;gap:10px;cursor:pointer;font-weight:700;color:var(--ink)}
.radio-prim .ring-r{width:18px;height:18px;border-radius:50%;border:2px solid var(--teal);display:grid;place-items:center}
.radio-prim .ring-r i{width:9px;height:9px;border-radius:50%;background:var(--teal);display:block}
/* ---------------------------------- Modal / Flow ---------------------------------- */
.overlay{
  position:fixed;inset:0;background:rgba(16,24,40,.55);backdrop-filter:blur(2px);
  display:flex;align-items:center;justify-content:center;padding:24px;z-index:100;
  opacity:0;visibility:hidden;transition:opacity .2s ease;
}
.overlay.is-open{opacity:1;visibility:visible}
.modal{
  width:100%;max-width:520px;background:#fff;border-radius:22px;box-shadow:var(--shadow-lg);
  padding:34px 34px 30px;transform:translateY(10px) scale(.98);opacity:0;transition:transform .22s ease,opacity .22s ease;
  max-height:92vh;overflow:auto;
}
.overlay.is-open .modal{transform:translateY(0) scale(1);opacity:1}

/* progress dots */
.steps{display:flex;align-items:center;justify-content:center;gap:0;margin:2px 0 22px}
.steps .node{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-weight:800;font-size:13px;flex:0 0 auto}
.node--done{background:var(--teal);color:#fff}
.node--active{background:var(--teal);color:#fff;box-shadow:0 0 0 4px var(--teal-tint)}
.node--todo{background:#eef1f4;color:#98a2b3}
.steps .bar{height:2px;width:52px;background:#e7eaee}
.steps .bar--done{background:var(--teal)}

.glyph{width:62px;height:62px;border-radius:50%;display:grid;place-items:center;margin:0 auto 16px;font-size:26px}
.glyph--warn{background:var(--red-soft);color:var(--red)}
.glyph--x{background:var(--red-soft);color:var(--red)}
.glyph--ok{background:var(--teal-tint);color:var(--teal)}

.m-title{font-size:23px;font-weight:800;text-align:center;letter-spacing:-.01em;margin:0 0 8px}
.m-sub{text-align:center;color:var(--ink-2);font-size:14.5px;line-height:1.5;margin:0 auto 22px;max-width:400px}

/* effects list */
.effects{display:flex;flex-direction:column;gap:14px;margin:6px 0 26px}
.effect{display:flex;align-items:center;gap:14px}
.effect__ic{width:40px;height:40px;border-radius:10px;background:var(--red-soft);color:var(--red);display:grid;place-items:center;font-size:18px;flex:0 0 auto}
.effect__tx{color:var(--ink);font-size:14.5px;font-weight:600}

/* reason options */
.reasons{display:flex;flex-direction:column;gap:11px;margin-bottom:22px}
.reason{
  display:flex;align-items:center;gap:12px;width:100%;text-align:left;cursor:pointer;
  border:1.6px solid var(--line);background:#fff;border-radius:12px;padding:16px 18px;
  font-size:15px;font-weight:700;color:var(--ink);transition:.14s;
}
.reason:hover{border-color:var(--teal-border);background:#fbfdfd}
.reason.is-selected{border-color:var(--teal);background:var(--teal-tint)}
.reason__radio{width:18px;height:18px;border-radius:50%;border:2px solid #cfd6dd;flex:0 0 auto;display:grid;place-items:center;transition:.14s}
.reason.is-selected .reason__radio{border-color:var(--teal)}
.reason.is-selected .reason__radio::after{content:"";width:9px;height:9px;border-radius:50%;background:var(--teal)}

/* offer cards */
.offers{display:flex;flex-direction:column;gap:12px;margin-bottom:20px}
.offer{
  display:flex;align-items:flex-start;gap:14px;width:100%;text-align:left;cursor:pointer;
  border:1.6px solid var(--line);background:#fff;border-radius:14px;padding:16px 18px;transition:.15s;
}
.offer:hover{transform:translateY(-1px);box-shadow:var(--shadow-md);border-color:var(--teal-border)}
.offer--primary{border-color:var(--teal-border);background:var(--teal-tint)}
.offer--primary:hover{border-color:var(--teal)}
.offer__badge{width:42px;height:42px;border-radius:11px;background:#fff;color:var(--teal);display:grid;place-items:center;font-size:20px;flex:0 0 auto;border:1px solid var(--teal-border)}
.offer--primary .offer__badge{background:#fff}
.offer__tx{display:flex;flex-direction:column;gap:4px}
.offer__title{font-size:15.5px;font-weight:800;color:var(--ink);line-height:1.3}
.offer__desc{font-size:13.5px;color:var(--ink-2);line-height:1.45}
.offer__best{font-size:11px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--teal-700);background:#fff;border:1px solid var(--teal-border);padding:2px 8px;border-radius:20px;margin-left:auto;flex:0 0 auto;align-self:center}

/* buttons inside modal */
.m-actions{display:flex;gap:12px;margin-top:4px}
.btn{flex:1;border:0;border-radius:11px;padding:14px 16px;font-weight:800;font-size:15px;cursor:pointer;transition:.15s;line-height:1.2}
.btn--primary{background:var(--teal);color:#fff;box-shadow:0 6px 16px rgba(0,128,136,.28)}
.btn--primary:hover{background:var(--teal-dark)}
.btn--neutral{background:#f1f3f5;color:var(--ink);border:1px solid var(--line)}
.btn--neutral:hover{background:#e9ecef}
.btn--danger-ghost{background:#fff;color:var(--red);border:1.5px solid #f3c1c4}
.btn--danger-ghost:hover{background:var(--red-soft)}
.btn--full{width:100%;flex:none}

.decline{display:block;width:100%;text-align:center;background:none;border:0;color:var(--ink-2);font-weight:700;font-size:14px;text-decoration:underline;cursor:pointer;padding:8px;margin-top:2px}
.decline:hover{color:var(--ink)}

.export-line{text-align:center;margin-top:14px;font-size:13px;color:var(--ink-3)}
.export-line button{background:none;border:0;color:var(--teal);font-weight:700;text-decoration:underline;cursor:pointer;font-size:13px}

.saved-list{background:var(--teal-tint);border:1px solid var(--teal-border);border-radius:12px;padding:14px 16px;margin:0 0 22px;color:var(--teal-700);font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:10px;line-height:1.45}

/* toast */
.toast{
  position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);
  background:var(--navy);color:#fff;padding:12px 18px;border-radius:12px;font-size:14px;font-weight:600;
  box-shadow:var(--shadow-lg);opacity:0;visibility:hidden;transition:.25s;z-index:200;display:flex;align-items:center;gap:9px;
}
.toast.show{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0)}
.toast svg{color:#5fd0c9}
.toast--info svg{display:none}

/* focus visibility */
:focus-visible{outline:2.5px solid var(--teal);outline-offset:2px;border-radius:8px}

/* ---------------------------------- Responsive ---------------------------------- */
@media (max-width:1080px){
  .topbar__links{display:none}
}
@media (max-width:720px){
  :root{--rail:58px}
  .content{padding:18px 14px 50px}
  .billing-head{align-items:flex-start}
  .search{display:none}
  .balance span{display:none}
  .modal{padding:26px 20px 22px;border-radius:18px}
  .m-title{font-size:20px}
  .m-actions{flex-direction:column}
}

@media (prefers-reduced-motion: reduce){
  *{transition:none!important;animation:none!important}
}
</style>
</head>
<body>
<div class="app">

  <!-- ============ Slim dark icon rail ============ -->
  <nav class="rail" aria-label="Primary">
    <div class="rail__logo" title="REsimpli">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5 12 3l9 6.5V20a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z"/></svg>
    </div>
    <button class="rail__btn" title="Leads"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg></button>
    <button class="rail__btn rail__btn--mail" title="Mail"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 6L2 7"/></svg></button>
    <button class="rail__btn" title="AI Writer"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 16 3 21l5-2"/><path d="m3 21 9-9"/><path d="M14 7s1-3 4-3 4 3 4 3-3 1-3 4 3 4 3 4-1 3-4 3-4-3-4-3"/></svg></button>
    <button class="rail__btn rail__btn--teal" title="Dashboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 12 16 8"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg></button>
    <button class="rail__btn rail__btn--teal" title="Marketing"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 11 18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></svg></button>
    <button class="rail__btn" title="Lists"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></button>
    <button class="rail__btn" title="Properties"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg></button>
    <button class="rail__btn rail__btn--teal" title="Tasks"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg></button>
    <button class="rail__btn" title="Contacts"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></button>
    <button class="rail__btn is-active" title="Billing" aria-current="page"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><path d="M12 6v2m0 8v2"/></svg></button>
    <div class="rail__spacer"></div>
    <button class="rail__btn" title="Settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
    <button class="rail__btn rail__btn--teal" title="Support"><span class="dot"></span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></button>
  </nav>

  <!-- ============ Main column ============ -->
  <div class="main">

    <!-- Topbar -->
    <header class="topbar">
      <a class="onb" href="#" onclick="return false">
        <svg class="ring" viewBox="0 0 36 36" aria-hidden="true">
          <circle cx="18" cy="18" r="15" fill="none" stroke="#f3d3d5" stroke-width="4"/>
          <circle cx="18" cy="18" r="15" fill="none" stroke="#dc2f3a" stroke-width="4" stroke-linecap="round" stroke-dasharray="94.2" stroke-dashoffset="82" transform="rotate(-90 18 18)"/>
          <text x="18" y="21.5" text-anchor="middle" font-size="9" font-weight="800" fill="#dc2f3a">13%</text>
        </svg>
        <span class="onb__txt">Onboarding Checklist</span>
      </a>

      <label class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" placeholder="Type anything and hit enter" />
      </label>

      <div class="topbar__links">
        <span class="tlink tlink--count" id="genCountdown">Gen 2.0 AI features expire in 27D: 08H:01M: 01S</span>
        <span class="tlink">Book Your Onboarding Call Today!</span>
      </div>

      <div class="topbar__right">
        <div class="btn-add">
          <button class="btn-add__main"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>Add</button>
          <button class="btn-add__caret" aria-label="More add options">▾</button>
        </div>
        <button class="iconbtn iconbtn--flame" title="Streak"><svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg></button>
        <button class="iconbtn" title="Calendar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></button>
        <button class="iconbtn" title="Notifications"><span class="dot"></span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg></button>
        <button class="balance" title="Balance"><span class="coin">$</span><span>Balance</span></button>
        <button class="avatar" title="Account"><span class="ph"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span><svg viewBox="0 0 24 24" fill="none" stroke="#98a2b3" stroke-width="2" stroke-linecap="round" style="width:14px;height:14px"><path d="m6 9 6 6 6-6"/></svg></button>
      </div>
    </header>

    <!-- Content -->
    <main class="content">
      <div class="billing-head">
        <h2 class="cards-title">Cards <span class="cards-count">(1)</span></h2>
        <div class="head-actions">
          <button class="btn-outline btn-outline--danger" id="cancelBtn">Cancel Subscription</button>
          <button class="btn-outline btn-outline--danger btn-addnew"><span class="plus-circle">+</span> Add New</button>
        </div>
      </div>

      <table class="cards-table">
        <thead>
          <tr><th>Card Detail</th><th>Expiring</th><th>Action</th></tr>
        </thead>
        <tbody>
          <tr>
            <td><div class="cardcell"><span class="brandmark">VISA</span> Visa ending with 2339</div></td>
            <td>12 / 2029</td>
            <td>
              <div class="act">
                <button class="act__icon" title="Remove card"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg></button>
                <button class="act__icon" title="Edit card"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg></button>
                <span class="radio-prim"><span class="ring-r"><i></i></span> Mark as primary</span>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </main>
  </div>
</div>

<!-- ============ Cancellation flow modal ============ -->
<div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="mTitle">
  <div class="modal" id="modal"><!-- rendered by JS --></div>
</div>

<!-- toast -->
<div class="toast" id="toast"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg><span id="toastMsg"></span></div>

<script>
/* ============================================================
   ICONS (Lucide-style)
   ============================================================ */
const ICONS = {
  percent:'<line x1="19" y1="5" x2="5" y2="19"/><circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/>',
  down:'<path d="M12 5v14"/><path d="m19 12-7 7-7-7"/>',
  pause:'<rect x="6" y="5" width="3.6" height="14" rx="1.2"/><rect x="14.4" y="5" width="3.6" height="14" rx="1.2"/>',
  phone:'<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>',
  shield:'<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/>',
  chat:'<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>',
  download:'<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="m7 10 5 5 5-5"/><path d="M12 15V3"/>',
  warn:'<path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><path d="M12 9v4"/><path d="M12 17h.01"/>',
  x:'<path d="M18 6 6 18"/><path d="m6 6 12 12"/>',
  check:'<path d="M20 6 9 17l-5-5"/>',
  db:'<ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>',
  zap:'<path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z"/>'
};
const icon = (n)=>`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${ICONS[n]||''}</svg>`;

/* ============================================================
   Reasons are still captured (useful signal), but every path now
   sees the SAME two save screens, then cancel:
     1) 50% off 3 months  +  downgrade to Basic
     2) 50% off 6 months  +  pause
   ============================================================ */
const REASON_LABELS = [
  'Too expensive',
  'Not enough leads to need a CRM',
  'Found it difficult to use',
  'Switching to another product',
  'A2P 10DLC concerns',
  'Shutting down my business'
];

// Save screen 1 — discount (3 months) + downgrade
const OFFER1 = {
  primary:{ic:'percent', title:'Stay for 50% off your next 3 months', desc:'Keep every number, automation and record. Reverts to standard after 3 cycles.', outcome:'disc3'},
  secondary:{ic:'down', title:'Move from Pro to Basic — $199/mo', desc:'Keep your data and numbers on a lighter plan.', outcome:'basic'}
};
// Save screen 2 — discount (6 months) + pause
const OFFER2 = {
  primary:{ic:'percent', title:'50% off for your next 6 months', desc:'Double the window. Everything stays as-is, reverts to standard after 6 cycles.', outcome:'disc6'},
  secondary:{ic:'pause', title:'Pause your plan — $49/mo', desc:'Keep your numbers active and data safe. Resume anytime.', outcome:'pause'}
};

/* Saved-state copy for each accepted offer */
const OUTCOMES = {
  disc3:{ msg:"Your 50% discount is locked in for the next 3 months. Same numbers, same automations, same data — nothing else changes." },
  disc6:{ msg:"Your 50% discount is locked in for the next 6 months. Everything stays exactly as it is." },
  basic:{ msg:"You're now on the Basic plan at $199/mo. Your data and numbers carried over — nothing was lost." },
  pause:{ msg:"Your plan is paused. Your numbers stay active and your data is safe — resume anytime from this page." }
};

/* ============================================================
   STATE
   ============================================================ */
const state = { step:'lossAversion', reason:null, result:null, exportStarted:false };
const overlay = document.getElementById('overlay');
const modal   = document.getElementById('modal');
let lastFocus = null;

/* ============================================================
   PROGRESS DOTS
   mode: 'none' | 'mid' (save phase, step 2) | 'confirm' (step 3)
   ============================================================ */
function steps(mode){
  if(mode==='none') return '';
  const mid = mode==='mid';
  return `<div class="steps" aria-hidden="true">
    <span class="node node--done">${'\u2713'}</span>
    <span class="bar bar--done"></span>
    <span class="node ${mid?'node--active':'node--done'}">${mid?'2':'\u2713'}</span>
    <span class="bar ${mid?'':'bar--done'}"></span>
    <span class="node ${mid?'node--todo':'node--active'}">3</span>
  </div>`;
}

function offerCard(o, isPrimary){
  return `<button class="offer ${isPrimary?'offer--primary':''}" data-action="accept" data-outcome="${o.outcome}">
    <span class="offer__badge">${icon(o.ic)}</span>
    <span class="offer__tx">
      <span class="offer__title">${o.title}</span>
      <span class="offer__desc">${o.desc}</span>
    </span>
    ${isPrimary?'<span class="offer__best">Best for you</span>':''}
  </button>`;
}

/* ============================================================
   RENDER each screen
   ============================================================ */
function render(){
  let html = '';

  if(state.step==='lossAversion'){
    html = `
      ${steps('none')}
      <div class="glyph glyph--warn">${icon('warn')}</div>
      <h2 class="m-title" id="mTitle">Are you sure you want to cancel?</h2>
      <p class="m-sub">Cancelling your subscription will have the following effects:</p>
      <div class="effects">
        <div class="effect"><span class="effect__ic">${icon('phone')}</span><span class="effect__tx">All phone numbers will be released permanently</span></div>
        <div class="effect"><span class="effect__ic">${icon('db')}</span><span class="effect__tx">Your data and files will be deleted after 30 days</span></div>
        <div class="effect"><span class="effect__ic">${icon('zap')}</span><span class="effect__tx">You'll lose access to all premium features</span></div>
      </div>
      <div class="m-actions">
        <button class="btn btn--primary" data-action="keep">Keep subscription</button>
        <button class="btn btn--neutral" data-action="goReason">Continue</button>
      </div>`;
  }

  else if(state.step==='reason'){
    const opts = REASON_LABELS.map(label=>`
      <button class="reason ${state.reason===label?'is-selected':''}" data-action="pickReason" data-id="${label}" aria-pressed="${state.reason===label}">
        <span class="reason__radio"></span>${label}
      </button>`).join('');
    html = `
      ${steps('mid')}
      <h2 class="m-title" id="mTitle">What's driving this?</h2>
      <p class="m-sub">It helps us know what to work on.</p>
      <div class="reasons">${opts}</div>
      <button class="btn btn--primary btn--full" data-action="goOffer1" ${state.reason?'':'disabled'} style="${state.reason?'':'opacity:.5;cursor:not-allowed;box-shadow:none'}">Continue</button>`;
  }

  else if(state.step==='shutdownExit'){
    // "Shutting down my business" — no save offers. Only data export + continue cancelling.
    const exported = state.exportStarted;
    html = `
      ${steps('mid')}
      <div class="glyph glyph--ok">${icon('download')}</div>
      <h2 class="m-title" id="mTitle">Download your data before you go</h2>
      <p class="m-sub">We're sorry to see you go. Export a copy of your records first — after you cancel, your data is deleted in 30 days.</p>
      ${exported
        ? `<div class="saved-list">${icon('check')}<span>Export started. We'll email a download link to your account shortly.</span></div>`
        : `<div class="offers"><button class="offer offer--primary" data-action="exportData">
             <span class="offer__badge">${icon('download')}</span>
             <span class="offer__tx">
               <span class="offer__title">Download my data</span>
               <span class="offer__desc">Contacts, deals, call logs and files, exported as a downloadable archive.</span>
             </span>
           </button></div>`}
      <button class="btn btn--neutral btn--full" data-action="continueCancel">Continue cancelling</button>`;
  }

  else if(state.step==='offer1'){
    html = `
      ${steps('mid')}
      <h2 class="m-title" id="mTitle">Before you go…</h2>
      <p class="m-sub">We'd hate to see you leave. Here's an option to make it easier to stay.</p>
      <div class="offers">
        ${offerCard(OFFER1.primary,true)}
        ${offerCard(OFFER1.secondary,false)}
      </div>
      <button class="decline" data-action="decline1">No thanks, continue cancelling</button>`;
  }

  else if(state.step==='offer2'){
    html = `
      ${steps('mid')}
      <h2 class="m-title" id="mTitle">One last offer</h2>
      <p class="m-sub">Our best save before you go.</p>
      <div class="offers">
        ${offerCard(OFFER2.primary,true)}
        ${offerCard(OFFER2.secondary,false)}
      </div>
      <button class="decline" data-action="decline2">No thanks, continue cancelling</button>`;
  }

  else if(state.step==='confirm'){
    html = `
      ${steps('confirm')}
      <div class="glyph glyph--x">${icon('x')}</div>
      <h2 class="m-title" id="mTitle">Confirm cancellation</h2>
      <p class="m-sub">Numbers released · data deleted in 30 days · access ends today</p>
      <div class="m-actions">
        <button class="btn btn--primary" data-action="keep">Keep subscription</button>
        <button class="btn btn--danger-ghost" data-action="submitCancel">Submit &amp; cancel</button>
      </div>`;
  }

  else if(state.step==='saved'){
    const o = OUTCOMES[state.result?.outcome] || {msg:"You're all set."};
    html = `
      <div class="glyph glyph--ok">${icon('check')}</div>
      <h2 class="m-title" id="mTitle">You're all set</h2>
      <div class="saved-list">${icon('check')}<span>${o.msg}</span></div>
      <button class="btn btn--primary btn--full" data-action="close">Back to billing</button>`;
  }

  else if(state.step==='cancelled'){
    html = `
      <div class="glyph glyph--x">${icon('x')}</div>
      <h2 class="m-title" id="mTitle">Your subscription is cancelled</h2>
      <p class="m-sub">You'll keep access until <strong>Jul 17, 2026</strong>. After that your numbers are released and your data is deleted in 30 days. Sorry to see you go — you're welcome back anytime.</p>
      <button class="btn btn--primary btn--full" data-action="close">Back to billing</button>`;
  }

  modal.innerHTML = html;
  // focus management
  const focusEl = modal.querySelector('.btn--primary, .reason, .offer, button:not([disabled])');
  if(focusEl) focusEl.focus();
}

/* ============================================================
   ACTIONS
   ============================================================ */
modal.addEventListener('click', (e)=>{
  const el = e.target.closest('[data-action]');
  if(!el) return;
  const a = el.dataset.action;

  switch(a){
    case 'keep':
    case 'close':       closeModal(); break;
    case 'goReason':    state.step='reason'; render(); break;
    case 'pickReason':  state.reason = el.dataset.id; render(); break;
    case 'goOffer1':
      if(state.reason){
        // Shutting down → skip save offers, go straight to data export + cancel
        state.step = (state.reason==='Shutting down my business') ? 'shutdownExit' : 'offer1';
        render();
      }
      break;
    case 'exportData':  state.exportStarted=true; toast('Data export started — we\u2019ll email your download link'); render(); break;
    case 'continueCancel': state.step='confirm'; render(); break;
    case 'decline1':    state.step='offer2'; render(); break;
    case 'decline2':    state.step='confirm'; render(); break;
    case 'accept':      acceptOffer(el.dataset.outcome); break;
    case 'submitCancel':state.result={type:'cancelled'}; state.step='cancelled'; render(); break;
  }
});

function acceptOffer(outcome){
  state.result = {type:'saved', outcome};
  state.step = 'saved';
  render();
}

/* ============================================================
   OPEN / CLOSE + dashboard reflection
   ============================================================ */
function openModal(){
  lastFocus = document.activeElement;
  state.step='lossAversion'; state.reason=null; state.exportStarted=false;
  // keep prior result so the plan card persists if reopened, but reset for a fresh run:
  state.result=null;
  render();
  overlay.classList.add('is-open');
  document.body.style.overflow='hidden';
}
function closeModal(){
  overlay.classList.remove('is-open');
  document.body.style.overflow='';
  if(state.result && state.result.type==='saved'){
    toast(RESULT_TOAST[state.result.outcome] || 'Offer applied');
  } else if(state.result && state.result.type==='cancelled'){
    toast('Subscription cancelled — access until Jul 17, 2026', false);
  }
  if(lastFocus) lastFocus.focus();
}

document.getElementById('cancelBtn').addEventListener('click', openModal);

// Escape closes (= keep subscription). Backdrop click intentionally does NOT,
// to keep demoers on the designed path.
document.addEventListener('keydown', (e)=>{
  if(e.key==='Escape' && overlay.classList.contains('is-open')) closeModal();
});

/* Short page-level confirmation shown after the flow closes */
const RESULT_TOAST = {
  disc3:'Discount applied — 50% off for 3 months',
  disc6:'Discount applied — 50% off for 6 months',
  basic:'Switched to Basic — $199/mo',
  pause:'Plan paused — resume anytime'
};

/* ============================================================
   Toast (ok = teal check; otherwise neutral, no check)
   ============================================================ */
let toastTimer;
function toast(msg, ok=true){
  const t = document.getElementById('toast');
  t.classList.toggle('toast--info', !ok);
  document.getElementById('toastMsg').textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2800);
}

/* ============================================================
   Live "Gen 2.0 expires" countdown (cosmetic, matches banner)
   ============================================================ */
(function(){
  const el=document.getElementById('genCountdown');
  const target = Date.now() + (27*86400 + 8*3600 + 1*60 + 1)*1000;
  function tick(){
    let s=Math.max(0,Math.floor((target-Date.now())/1000));
    const d=Math.floor(s/86400); s-=d*86400;
    const h=Math.floor(s/3600);  s-=h*3600;
    const m=Math.floor(s/60);    s-=m*60;
    const p=n=>String(n).padStart(2,'0');
    el.textContent=`Gen 2.0 AI features expire in ${d}D: ${p(h)}H:${p(m)}M: ${p(s)}S`;
  }
  tick(); setInterval(tick,1000);
})();
</script>
